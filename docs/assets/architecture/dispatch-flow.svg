<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Inter','Noto Sans SC',system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#64748b"/></marker>
    <marker id="arrWarn" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#d97706"/></marker>
  </defs>
  <rect width="900" height="600" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1a202c">江南出行 — 并发调度核心流程 (二阶分布式锁)</text>

  <!-- Phase 1: 下单 -->
  <rect x="30" y="44" width="180" height="40" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/><text x="120" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">1. 乘客下单 + 支付</text><text x="120" y="77" text-anchor="middle" font-size="9" fill="#94a3b8">订单状态: CREATED → PAID</text>
  <line x1="210" y1="64" x2="250" y2="64" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="255" y="44" width="180" height="40" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/><text x="345" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">2. 触发派单</text><text x="345" y="77" text-anchor="middle" font-size="9" fill="#94a3b8">findCandidates() 司机筛选</text>
  <line x1="435" y1="64" x2="475" y2="64" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="480" y="44" width="180" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/><text x="570" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">3. 评分排序</text><text x="570" y="77" text-anchor="middle" font-size="9" fill="#92400e">静态加权 + 动态修正</text>
  <line x1="660" y1="64" x2="700" y2="64" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="705" y="44" width="170" height="40" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/><text x="790" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">4. 候选司机队列</text><text x="790" y="77" text-anchor="middle" font-size="9" fill="#94a3b8">按评分降序排列</text>

  <!-- Scoring detail -->
  <rect x="150" y="92" width="600" height="36" rx="6" fill="#fef9e7" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="450" y="107" text-anchor="middle" font-size="10" fill="#92400e">评分公式: distance(40%) + rating(30%) + idleTime(20%) + rejectPenalty(10%) + dynamicModifier</text>
  <text x="450" y="121" text-anchor="middle" font-size="9" fill="#b45309">动态修正: 接单+5 · 拒单-10 · 10min半衰期 · 上下限[-30,+20] · 5轮收敛 50%→70%</text>

  <line x1="450" y1="128" x2="450" y2="150" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrWarn)"/>

  <!-- Phase 2: Lock Loop -->
  <text x="450" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">▼ 二阶分布式锁循环 ▼</text>

  <!-- Lock Step 1 -->
  <rect x="60" y="178" width="780" height="56" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/>
  <text x="450" y="196" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">阶段 1: 锁订单 — lock(&quot;order:dispatch:{orderId}&quot;)</text>
  <text x="450" y="214" text-anchor="middle" font-size="10" fill="#065f46">互斥锁: 保证同一订单不会被两个派单线程同时处理 | 锁持有: 派单完成后释放 | WatchDog 自动续期</text>
  <text x="450" y="228" text-anchor="middle" font-size="9" fill="#059669">✓ 获取成功后进入阶段 2</text>

  <line x1="450" y1="234" x2="450" y2="252" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Lock Step 2 -->
  <rect x="60" y="256" width="780" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="450" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">阶段 2: 锁司机 — tryLock(&quot;driver:lock:{driverId}&quot;, 500ms)</text>
  <text x="450" y="292" text-anchor="middle" font-size="10" fill="#92400e">尝试锁: tryLock 带超时 → 成功则独占该司机 → 超时则尝试下一位司机</text>
  <text x="450" y="306" text-anchor="middle" font-size="9" fill="#d97706">⚠ 锁顺序 100% 统一: order → driver (数学上无死锁) | 失败 fallback: 尝试下一个候选</text>

  <!-- Branch -->
  <line x1="450" y1="312" x2="450" y2="332" stroke="#64748b" stroke-width="1.5"/>
  <rect x="195" y="332" width="120" height="26" rx="13" fill="#059669"/><text x="255" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">tryLock 成功</text>
  <rect x="585" y="332" width="120" height="26" rx="13" fill="#dc2626"/><text x="645" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">tryLock 超时</text>

  <!-- Success path -->
  <line x1="255" y1="358" x2="255" y2="378" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="60" y="382" width="380" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="250" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">⭐ 关键: 加锁后重读 DB (防 ABA 竞态)</text>
  <text x="250" y="418" text-anchor="middle" font-size="10" fill="#92400e">driverMapper.selectById(candidate.getId()) → 确认司机仍可用</text>
  <text x="250" y="432" text-anchor="middle" font-size="9" fill="#b45309">教训: 分布式锁只保证互斥，不保证数据新鲜度。AI 生成的代码在这里有 Bug</text>

  <line x1="250" y1="438" x2="250" y2="458" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="60" y="462" width="380" height="40" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="250" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">分配成功 → 更新订单状态 → 记录事件 → 推送通知</text>
  <text x="250" y="496" text-anchor="middle" font-size="9" fill="#065f46">ASSIGNED · DISPATCHED 事件 · WebSocket 推送给司机</text>

  <!-- Fail path -->
  <line x1="645" y1="358" x2="645" y2="378" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="500" y="382" width="290" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8"/>
  <text x="645" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">尝试下一个候选司机</text>
  <text x="645" y="415" text-anchor="middle" font-size="9" fill="#991b1b">循环继续 → 直到找到可用司机或队列耗尽</text>

  <line x1="645" y1="422" x2="645" y2="448" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="645" y1="448" x2="250" y2="448" stroke="#dc2626" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="250" y1="448" x2="250" y2="462" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Result banner -->
  <rect x="60" y="516" width="780" height="36" rx="6" fill="#f8f9fa"/>
  <text x="450" y="534" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">验证结果: 100 订单 × 20 司机 压力测试 — 零重复分配 · 零死锁 · 平均延迟 &lt; 150ms · 批量调 &lt; 350ms</text>
  <text x="450" y="548" text-anchor="middle" font-size="9" fill="#64748b">所有状态变更写入 t_order_event 事件溯源表 · 状态机 guardTransition 校验 · ScoringEngine 记录接单/拒单反馈</text>

  <!-- Footer -->
  <rect x="60" y="562" width="780" height="30" rx="4" fill="transparent"/>
  <text x="450" y="582" text-anchor="middle" font-size="9" fill="#94a3b8">关键技术: Redisson RLock · 二阶锁 · tryLock 超时 · 锁后重读防 ABA · WatchDog 续期 · finally 释放 · 锁顺序无死锁</text>
</svg>
