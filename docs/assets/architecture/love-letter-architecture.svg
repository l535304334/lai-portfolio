<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Inter','Noto Sans SC',system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="900" height="560" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1a202c">两地书 Love — 系统架构</text>

  <!-- === CLIENT === -->
  <rect x="20" y="48" width="860" height="72" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1.2"/>
  <rect x="20" y="48" width="860" height="22" rx="6" fill="#1e293b"/><rect x="20" y="62" width="860" height="8" fill="#1e293b"/>
  <text x="450" y="63" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">微信小程序客户端 (Taro 4 + React 18 + TypeScript strict + Zustand)</text>

  <rect x="40" y="80" width="130" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/><text x="105" y="99" text-anchor="middle" font-size="11" fill="#92400e">🏠 首页 Dashboard</text>
  <rect x="185" y="80" width="130" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/><text x="250" y="99" text-anchor="middle" font-size="11" fill="#92400e">📬 信箱 (4合1)</text>
  <rect x="330" y="80" width="130" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/><text x="395" y="99" text-anchor="middle" font-size="11" fill="#92400e">💑 我们 (打卡·纪念日)</text>
  <rect x="475" y="80" width="130" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/><text x="540" y="99" text-anchor="middle" font-size="11" fill="#92400e">💜 关怀 (经期·科普)</text>
  <rect x="620" y="80" width="120" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/><text x="680" y="99" text-anchor="middle" font-size="11" fill="#1e40af">👤 游客模式</text>
  <rect x="755" y="80" width="110" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/><text x="810" y="99" text-anchor="middle" font-size="11" fill="#1e40af">⚙️ 设置</text>

  <!-- Client -> Cloud arrows -->
  <line x1="250" y1="120" x2="250" y2="144" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="120" x2="450" y2="144" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="120" x2="650" y2="144" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="265" y="137" font-size="9" fill="#94a3b8">Taro.cloud.callFunction()</text>

  <!-- === CLOUD FUNCTIONS === -->
  <rect x="20" y="148" width="860" height="150" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1.2"/>
  <rect x="20" y="148" width="860" height="22" rx="6" fill="#1e293b"/><rect x="20" y="162" width="860" height="8" fill="#1e293b"/>
  <text x="450" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">微信云函数 (26个 Node.js) — CloudBase</text>

  <!-- Auth -->
  <rect x="35" y="178" width="180" height="52" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="125" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">🔐 认证层</text>
  <text x="125" y="210" text-anchor="middle" font-size="9" fill="#065f46">login · getUserProfile</text>
  <text x="125" y="224" text-anchor="middle" font-size="9" fill="#065f46">generatePairCode · joinPair</text>

  <!-- Business -->
  <rect x="230" y="178" width="210" height="52" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="335" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">⚙️ 业务层</text>
  <text x="335" y="210" text-anchor="middle" font-size="9" fill="#92400e">getMailbox ★ · sendLetter · sendNote</text>
  <text x="335" y="224" text-anchor="middle" font-size="9" fill="#92400e">saveMood · updatePeriod · manageRecord</text>

  <!-- AI -->
  <rect x="455" y="178" width="220" height="52" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="565" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">🤖 AI 层 (8 个 AI 云函数)</text>
  <text x="565" y="210" text-anchor="middle" font-size="9" fill="#5b21b6">书信润色 · 诗歌生成 · 语感检查</text>
  <text x="565" y="224" text-anchor="middle" font-size="9" fill="#5b21b6">备忘提取 · 科普文章 · 健康建议 等</text>

  <!-- Tools -->
  <rect x="690" y="178" width="175" height="52" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="777" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">🛠️ 工具层</text>
  <text x="777" y="210" text-anchor="middle" font-size="9" fill="#1e40af">getWeather · scheduledTasks</text>
  <text x="777" y="224" text-anchor="middle" font-size="9" fill="#1e40af">migrateReadState</text>

  <!-- Shared modules -->
  <rect x="35" y="238" width="410" height="26" rx="3" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <text x="240" y="255" text-anchor="middle" font-size="10" fill="#92400e">📦 共享模块: common/deepseek.js (AI调用封装) + common/rateLimit.js (滑动窗口 10次/分/用户)</text>

  <rect x="460" y="238" width="405" height="26" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="662" y="255" text-anchor="middle" font-size="10" fill="#991b1b">🔒 安全: OPENID服务端推导 · 字段白名单 · 创建者校验 · msgSecCheck · Prompt注入防护</text>

  <!-- Cloud -> Data arrows -->
  <line x1="300" y1="298" x2="300" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="298" x2="600" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- === DATA === -->
  <rect x="20" y="324" width="860" height="66" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1.2"/>
  <rect x="20" y="324" width="860" height="22" rx="6" fill="#1e293b"/><rect x="20" y="338" width="860" height="8" fill="#1e293b"/>
  <text x="450" y="339" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">微信云开发 CloudBase</text>

  <rect x="40" y="352" width="240" height="28" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="160" y="370" text-anchor="middle" font-size="10" fill="#475569">🗄️ 云数据库 (22个集合) — 安全分层</text>

  <rect x="300" y="352" width="200" height="28" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#475569">📦 云存储 (照片 · 头像)</text>

  <rect x="520" y="352" width="160" height="28" rx="3" fill="#dcfce7" stroke="#059669" stroke-width="0.8"/>
  <text x="600" y="370" text-anchor="middle" font-size="10" fill="#065f46">⏰ 定时任务 (每5分钟)</text>

  <rect x="700" y="352" width="165" height="28" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8"/>
  <text x="782" y="370" text-anchor="middle" font-size="10" fill="#991b1b">🔑 数据安全规则 (console)</text>

  <!-- Data -> External -->
  <line x1="450" y1="390" x2="450" y2="412" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- === EXTERNAL === -->
  <rect x="130" y="416" width="640" height="40" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="450" y="441" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">🌐 外部 API</text>

  <rect x="155" y="432" width="150" height="18" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="0.5"/><text x="230" y="445" text-anchor="middle" font-size="10" fill="#5b21b6">DeepSeek Chat API</text>
  <rect x="330" y="432" width="130" height="18" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="0.5"/><text x="395" y="445" text-anchor="middle" font-size="10" fill="#1e40af">和风天气 API</text>
  <rect x="485" y="432" width="140" height="18" rx="3" fill="#dcfce7" stroke="#059669" stroke-width="0.5"/><text x="555" y="445" text-anchor="middle" font-size="10" fill="#065f46">微信订阅推送</text>
  <rect x="650" y="432" width="100" height="18" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.5"/><text x="700" y="445" text-anchor="middle" font-size="10" fill="#475569">微信登录</text>

  <!-- === DESIGN PATTERNS === -->
  <rect x="130" y="468" width="640" height="36" rx="4" fill="#f8f9fa"/>
  <text x="450" y="484" text-anchor="middle" font-size="10" fill="#64748b">关键设计模式: per-user软删除 (deletedBy[]) · 已读追踪 (readBy[]) · pendingConfirm确认机制 · 幂等通知 · TTL索引</text>
  <text x="450" y="498" text-anchor="middle" font-size="10" fill="#94a3b8">技术决策: AI云函数代理 · 数据访问混合分层 · per-user数组软删除</text>

  <!-- Legend -->
  <rect x="20" y="516" width="860" height="36" rx="4" fill="transparent"/>
  <rect x="35" y="524" width="10" height="10" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="0.5"/><text x="50" y="533" font-size="9" fill="#64748b">核心业务</text>
  <rect x="110" y="524" width="10" height="10" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="0.5"/><text x="125" y="533" font-size="9" fill="#64748b">AI 功能</text>
  <rect x="180" y="524" width="10" height="10" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="0.5"/><text x="195" y="533" font-size="9" fill="#64748b">工具/支撑</text>
  <rect x="260" y="524" width="10" height="10" rx="2" fill="#fee2e2" stroke="#dc2626" stroke-width="0.5"/><text x="275" y="533" font-size="9" fill="#64748b">安全/防护</text>
  <rect x="340" y="524" width="10" height="10" rx="2" fill="#f0fdf4" stroke="#22c55e" stroke-width="0.5"/><text x="355" y="533" font-size="9" fill="#64748b">认证</text>
  <text x="450" y="533" font-size="9" fill="#94a3b8">★ getMailbox 云函数作为统一信箱代理，集中所有特权读操作</text>
</svg>
